<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VerseByLuha ✨</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffb6f9, #a0e7ff, #cdb4ff);
    color: #333;
    text-align: center;
    padding: 20px;
}

h1 {
    color: white;
    text-shadow: 0 0 10px rgba(255,255,255,0.8);
}

.container {
    background: rgba(255,255,255,0.9);
    padding: 20px;
    border-radius: 20px;
    max-width: 400px;
    margin: auto;
}

select, input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

.total {
    font-size: 24px;
    font-weight: bold;
    color: #6a00f4;
}

.note {
    font-size: 12px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>✨ VerseByLuha ✨</h1>

<div class="container">

<h3>Técnica</h3>
<select id="tecnica">
<option value="15">Esmaltado permanente (S/15)</option>
<option value="25">Rubber (S/25)</option>
<option value="30">Builder gel (S/30)</option>
<option value="35">Acrílicas (S/35)</option>
</select>

<h3>Largo</h3>
<select id="largo">
<option value="0">Largo 1 (incluido)</option>
<option value="5">Largo 2 (+5)</option>
<option value="8">Largo 3 (+8)</option>
<option value="10">Largo 4 (+10)</option>
<option value="12">Largo 5 (+12)</option>
<option value="15">Largo 6 (+15)</option>
</select>

<h3>Decoraciones (cantidad de uñas)</h3>
<input type="number" id="deco" placeholder="Cantidad de uñas decoradas">

<h3>Piedritas (cantidad)</h3>
<input type="number" id="piedras" placeholder="Cantidad de strass">

<h3>Retiro</h3>
<select id="retiro">
<option value="0">No</option>
<option value="15">Sí (+15)</option>
</select>

<h2 class="total">Total: S/ <span id="total">0</span></h2>

<p class="note">
El precio base aplica solo para uñas cortas y sin diseño.<br>
Cada set es único, como tu universo ✨
</p>

</div>

<script>
function calcular() {
    let tecnica = parseInt(document.getElementById("tecnica").value) || 0;
    let largo = parseInt(document.getElementById("largo").value) || 0;
    let deco = parseInt(document.getElementById("deco").value) || 0;
    let piedras = parseInt(document.getElementById("piedras").value) || 0;
    let retiro = parseInt(document.getElementById("retiro").value) || 0;

    let total = tecnica + largo + (deco * 3) + (piedras * 0.5) + retiro;

    document.getElementById("total").innerText = total.toFixed(2);
}

document.querySelectorAll("select, input").forEach(el => {
    el.addEventListener("input", calcular);
});
</script>

</body>
</html>
